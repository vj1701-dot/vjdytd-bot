version: '3.8'

services:
  # Redis for queue and state management
  redis:
    image: redis:7-alpine
    container_name: vjdytd-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - vjdytd-network

  # JDownloader service
  jdownloader:
    image: jlesage/jdownloader-2:latest
    container_name: vjdytd-jdownloader
    restart: unless-stopped
    ports:
      - "5800:5800"
      - "3129:3129"
    volumes:
      - jdownloader_config:/config
      - ./downloads:/downloads
    environment:
      - DISPLAY_WIDTH=1280
      - DISPLAY_HEIGHT=768
      - VNC_PASSWORD=jdownloader
    networks:
      - vjdytd-network

  # FastAPI service - JDownloader wrapper
  fastapi-service:
    build:
      context: ./fastapi-service
      dockerfile: Dockerfile
    container_name: vjdytd-fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./downloads:/downloads
      - ./shared:/app/shared
      - ./logs:/logs
    env_file:
      - .env
    depends_on:
      - redis
      - jdownloader
    networks:
      - vjdytd-network

  # Telegram Bot
  telegram-bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    container_name: vjdytd-telegram-bot
    restart: unless-stopped
    volumes:
      - ./downloads:/downloads
      - ./shared:/app/shared
      - ./logs:/logs
      - bot_data:/app/data
    env_file:
      - .env
    depends_on:
      - redis
      - fastapi-service
    networks:
      - vjdytd-network

  # Cleanup Worker
  cleanup-worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: vjdytd-cleanup-worker
    restart: unless-stopped
    volumes:
      - ./downloads:/downloads
      - ./shared:/app/shared
      - ./logs:/logs
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - vjdytd-network

  # Optional: Local Telegram Bot API Server
  # Uncomment if you want to use local bot API for larger file uploads
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: vjdytd-bot-api
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - telegram_bot_api:/var/lib/telegram-bot-api
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
    networks:
      - vjdytd-network

volumes:
  redis_data:
  jdownloader_config:
  bot_data:
  telegram_bot_api:

networks:
  vjdytd-network:
    driver: bridge
